# Orchis Rice — Default Configuration
# Copy this file and modify values to customize your installation.
# The installer reads this file automatically if present.

# ── Theme ───────────────────────────────────────────────────────────────────
GTK_THEME="Orchis-Dark"
ICON_THEME="Tela-circle-dark"
CURSOR_THEME="Bibata-Modern-Ice"
CURSOR_SIZE=24

# ── Fonts ───────────────────────────────────────────────────────────────────
FONT_NAME="Inter"
FONT_STYLE="Regular"
FONT_SIZE=11
MONOSPACE_FONT="JetBrainsMono Nerd Font"
MONOSPACE_FONT_SIZE=13
TITLEBAR_FONT_STYLE="Bold"

# ── Dock Favorites ──────────────────────────────────────────────────────────
# Comma-separated list of app keywords (detected automatically).
# Supported: brave, firefox, chrome, chromium, code, terminal, files, settings, text-editor
FAVORITES="brave,firefox,code,terminal,files,settings"

# ── Appearance ──────────────────────────────────────────────────────────────
COLOR_SCHEME="prefer-dark"
CLOCK_FORMAT="24h"
BUTTON_LAYOUT="close,minimize,maximize:"
