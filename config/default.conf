# Orchis Rice — Default Configuration
# Edit this file to customize your installation.
# The installer reads it automatically if present.

# ── Theme ───────────────────────────────────────────────────────────────────
GTK_THEME="Orchis-Dark"
ICON_THEME="Tela-circle-dark"
CURSOR_THEME="Bibata-Modern-Ice"
CURSOR_SIZE=24

# ── Orchis Theme Options ────────────────────────────────────────────────────
# See Orchis-theme installation options for details
ORCHIS_THEME_VARIANT="default" # [default|purple|pink|red|orange|yellow|green|teal|grey|all]
ORCHIS_COLOR_VARIANT="dark"    # [standard|light|dark]
ORCHIS_SIZE_VARIANT=""         # [standard|compact]
ORCHIS_ICON_VARIANT=""         # [default|apple|simple|gnome|ubuntu|arch|manjaro|fedora|debian|void|opensuse|popos|mxlinux|zorin|endeavouros|tux|nixos|gentoo|budgie|solus|kali]
ORCHIS_TWEAKS="macos"          # [solid|compact|black|primary|macos|submenu|(nord/dracula)|dock] (Can mix separated by space)
ORCHIS_ROUND=""                # [3px to 15px]
ORCHIS_LIBADWAITA="false"      # [true|false] Link to libadwaita
ORCHIS_FIXED="false"           # [true|false] Fixed accent color for gnome-shell >= 47
ORCHIS_SHELL_VERSION=""        # [38|40|42|44|46|47|48] Leave empty for auto-detect

# ── Fonts ───────────────────────────────────────────────────────────────────
FONT_NAME="Inter"
FONT_STYLE="Regular"
FONT_SIZE=11
MONOSPACE_FONT="JetBrainsMono Nerd Font"
MONOSPACE_FONT_SIZE=13
TITLEBAR_FONT_STYLE="Bold"


# ── Appearance ──────────────────────────────────────────────────────────────
COLOR_SCHEME="prefer-dark"
CLOCK_FORMAT="24h"

# macOS-style window buttons (left side, matches Orchis --tweaks macos)
BUTTON_LAYOUT=":minimize,maximize,close"
