# Orchis Rice — Default Configuration
# Edit this file to customize your installation.
# The installer reads it automatically if present.

# ── Theme ───────────────────────────────────────────────────────────────────
GTK_THEME="Orchis-Dark"
ICON_THEME="Tela-circle-dark"
CURSOR_THEME="Bibata-Modern-Ice"
CURSOR_SIZE=24

# ── Fonts ───────────────────────────────────────────────────────────────────
FONT_NAME="Inter"
FONT_STYLE="Regular"
FONT_SIZE=11
MONOSPACE_FONT="JetBrainsMono Nerd Font"
MONOSPACE_FONT_SIZE=13
TITLEBAR_FONT_STYLE="Bold"


# ── Appearance ──────────────────────────────────────────────────────────────
COLOR_SCHEME="prefer-dark"
CLOCK_FORMAT="24h"

# macOS-style window buttons (left side, matches Orchis --tweaks macos)
BUTTON_LAYOUT=":minimize,maximize,close"
